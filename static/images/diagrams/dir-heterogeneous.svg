<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" width="560" height="420" role="img" aria-label="Federated heterogeneous collaboration across institutions and model architectures">
  <defs>
    <marker id="het-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="560" height="420" fill="#ffffff"/>

  <!-- Links: distilled knowledge / model updates travel, raw data does not -->
  <line x1="168" y1="98" x2="202" y2="160" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>
  <line x1="392" y1="98" x2="358" y2="160" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>
  <line x1="168" y1="322" x2="202" y2="244" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>
  <line x1="392" y1="322" x2="358" y2="244" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>

  <text x="128" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">model updates only</text>
  <text x="432" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">model updates only</text>

  <!-- Central aggregation hub -->
  <g>
    <rect x="175" y="160" width="210" height="86" rx="6" fill="#f7f7f5" stroke="#7a1732" stroke-width="1.5"/>
    <text x="280" y="192" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="#7a1732">heterogeneous</text>
    <text x="280" y="212" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" fill="#7a1732">knowledge distillation</text>
    <text x="280" y="232" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368">cloud-side aggregation</text>
  </g>

  <!-- Institution nodes with heterogeneous local architectures -->
  <g>
    <rect x="20" y="38" width="180" height="70" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="110" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Hospital A</text>
    <text x="110" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#7a1732">local model: ResNet</text>
    <text x="110" y="97" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368">data stays local</text>
  </g>
  <g>
    <rect x="360" y="38" width="180" height="70" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="450" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Hospital B</text>
    <text x="450" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#7a1732">local model: ViT</text>
    <text x="450" y="97" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368">data stays local</text>
  </g>
  <g>
    <rect x="20" y="312" width="180" height="70" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="110" y="336" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Clinic C</text>
    <text x="110" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#7a1732">local model: MLP</text>
    <text x="110" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368">data stays local</text>
  </g>
  <g>
    <rect x="360" y="312" width="180" height="70" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="450" y="336" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Institute D</text>
    <text x="450" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#7a1732">local model: U-Net</text>
    <text x="450" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368">data stays local</text>
  </g>

  <!-- Caption -->
  <text x="280" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-style="italic" fill="#5f6368">model updates only · no raw data exchange</text>
</svg>
