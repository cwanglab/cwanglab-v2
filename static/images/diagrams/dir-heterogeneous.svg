<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360" role="img" aria-label="Federated heterogeneous collaboration diagram">
  <defs>
    <marker id="het-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="480" height="360" fill="#ffffff"/>

  <!-- Links: only model parameters travel -->
  <line x1="110" y1="108" x2="182" y2="150" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>
  <line x1="370" y1="108" x2="298" y2="150" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>
  <line x1="240" y1="266" x2="240" y2="216" stroke="#5f6368" stroke-width="1.5" marker-start="url(#het-arrow)" marker-end="url(#het-arrow)"/>

  <text x="96" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368" transform="rotate(32 96 138)">model updates only</text>
  <text x="384" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368" transform="rotate(-32 384 138)">model updates only</text>
  <text x="262" y="244" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="11" font-style="italic" fill="#5f6368">model updates only</text>

  <!-- Central hub -->
  <g>
    <rect x="155" y="148" width="170" height="66" rx="6" fill="#f7f7f5" stroke="#7a1732" stroke-width="1.5"/>
    <text x="240" y="176" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#7a1732">Model updates</text>
    <text x="240" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-style="italic" fill="#5f6368">global aggregation</text>
  </g>

  <!-- Institution nodes -->
  <g>
    <rect x="15" y="45" width="160" height="62" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="95" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Hospital A</text>
    <text x="95" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-style="italic" fill="#5f6368">data stays local</text>
  </g>
  <g>
    <rect x="305" y="45" width="160" height="62" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="385" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Hospital B</text>
    <text x="385" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-style="italic" fill="#5f6368">data stays local</text>
  </g>
  <g>
    <rect x="160" y="268" width="160" height="62" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <text x="240" y="293" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3c4043">Institution C</text>
    <text x="240" y="313" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-style="italic" fill="#5f6368">data stays local</text>
  </g>
</svg>
