<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" width="560" height="420" role="img" aria-label="Whole-body MRI measurement and association pipeline">
  <defs>
    <marker id="med-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7a1732"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="560" height="420" fill="#ffffff"/>

  <!-- Step 1: Whole-body MRI -->
  <g>
    <text x="70" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#7a1732">1</text>
    <rect x="11" y="105" width="118" height="150" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <rect x="50" y="123" width="40" height="28" rx="4" fill="none" stroke="#7a1732" stroke-width="1.5"/>
    <circle cx="70" cy="137" r="7" fill="none" stroke="#7a1732" stroke-width="1.3"/>
    <text x="70" y="183" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">Whole-body</text>
    <text x="70" y="199" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">MRI</text>
    <text x="70" y="219" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">UK Biobank ·</text>
    <text x="70" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">&#8776;47,000 participants</text>
  </g>

  <!-- Step 2: deep-learning measurement -->
  <g>
    <text x="210" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#7a1732">2</text>
    <rect x="151" y="105" width="118" height="150" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <line x1="180" y1="152" x2="240" y2="152" stroke="#d8d9da" stroke-width="1.2"/>
    <line x1="187" y1="152" x2="187" y2="134" stroke="#7a1732" stroke-width="2.2"/>
    <line x1="202" y1="152" x2="202" y2="124" stroke="#7a1732" stroke-width="2.2"/>
    <line x1="217" y1="152" x2="217" y2="140" stroke="#7a1732" stroke-width="2.2"/>
    <line x1="232" y1="152" x2="232" y2="128" stroke="#7a1732" stroke-width="2.2"/>
    <text x="210" y="183" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">deep-learning</text>
    <text x="210" y="199" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">measurement</text>
    <text x="210" y="219" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">spine, femoral head,</text>
    <text x="210" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">total hip,</text>
    <text x="210" y="247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">femoral diaphysis</text>
  </g>

  <!-- Step 3: association studies -->
  <g>
    <text x="350" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#7a1732">3</text>
    <rect x="291" y="105" width="118" height="150" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <circle cx="334" cy="130" r="4.5" fill="none" stroke="#7a1732" stroke-width="1.4"/>
    <circle cx="366" cy="130" r="4.5" fill="none" stroke="#7a1732" stroke-width="1.4"/>
    <circle cx="350" cy="150" r="4.5" fill="none" stroke="#7a1732" stroke-width="1.4"/>
    <line x1="339" y1="132" x2="361" y2="132" stroke="#5f6368" stroke-width="1.1"/>
    <line x1="337" y1="134" x2="347" y2="146" stroke="#5f6368" stroke-width="1.1"/>
    <line x1="363" y1="134" x2="353" y2="146" stroke="#5f6368" stroke-width="1.1"/>
    <text x="350" y="177" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">phenome-wide and</text>
    <text x="350" y="193" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">genome-wide</text>
    <text x="350" y="209" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">association</text>
    <text x="350" y="229" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">PheWAS · GWAS</text>
    <text x="350" y="243" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">meta-analyses</text>
  </g>

  <!-- Step 4: clinical insights -->
  <g>
    <text x="490" y="88" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#7a1732">4</text>
    <rect x="431" y="105" width="118" height="150" fill="#ffffff" stroke="#5f6368" stroke-width="1.2"/>
    <circle cx="490" cy="138" r="14" fill="none" stroke="#7a1732" stroke-width="1.5"/>
    <line x1="490" y1="131" x2="490" y2="145" stroke="#7a1732" stroke-width="1.8"/>
    <line x1="483" y1="138" x2="497" y2="138" stroke="#7a1732" stroke-width="1.8"/>
    <text x="490" y="183" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#3c4043">clinical insights</text>
    <text x="490" y="219" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">fracture risk,</text>
    <text x="490" y="233" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic" fill="#5f6368">osteoporosis</text>
  </g>

  <!-- Flow arrows -->
  <line x1="131" y1="180" x2="147" y2="180" stroke="#7a1732" stroke-width="2" marker-end="url(#med-arrow)"/>
  <line x1="271" y1="180" x2="287" y2="180" stroke="#7a1732" stroke-width="2" marker-end="url(#med-arrow)"/>
  <line x1="411" y1="180" x2="427" y2="180" stroke="#7a1732" stroke-width="2" marker-end="url(#med-arrow)"/>

  <!-- Source note -->
  <text x="280" y="305" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-style="italic" fill="#5f6368">Nature Communications, 2025</text>
</svg>
