{{ define "main" }}
<section class="page-head">
  <div class="shell">
    <p class="kicker">Error 404</p>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist, or it may have been moved.</p>
  </div>
</section>
<section class="section">
  <div class="shell">
    <div class="content">
      <h2>Where to go next</h2>
      <p>Start again from the <a href="{{ relURL "/" }}">home page</a>, or jump straight to one of the main sections:</p>
      <ul class="error-links">
        {{ range site.Menus.main }}
        <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </div>
  </div>
</section>
{{ end }}
