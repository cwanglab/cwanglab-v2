{{ define "main" }}
  <header class="page-head">
    <div class="shell">
      <p class="kicker">{{ .Section | title }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
    </div>
  </header>
  <section class="section">
    <div class="shell">
      <article class="content">{{ .Content }}</article>
    </div>
  </section>
{{ end }}
