{{ define "main" }}
  <header class="page-head">
    <div class="shell">
      <h1>{{ .Title }}</h1>
      {{ with .Params.intro }}<p>{{ . }}</p>{{ else }}{{ with .Description }}<p>{{ . }}</p>{{ end }}{{ end }}
    </div>
  </header>
  <section class="section">
    <div class="shell">
      <div class="content">{{ .Content }}</div>
    </div>
  </section>
{{ end }}
