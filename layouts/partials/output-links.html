{{/* output-links.html — unified link chips for publications and projects.
     Renders a row of chip-style buttons from front matter fields:
     doi, arxiv, pdf, code, data, project, project_url, oa_url.
     Fields that are empty are hidden.
     Chip CSS (.chips / .chip) is provided by the calling templates'
     own <style> blocks (publications, projects, news single). */}}
{{ $p := .Params }}
{{ if or $p.doi $p.arxiv $p.pdf $p.code $p.data $p.project $p.project_url $p.oa_url }}
  <div class="chips">
    {{ with $p.doi }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg>DOI</a>{{ end }}
    {{ with $p.arxiv }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>arXiv</a>{{ end }}
    {{ with $p.pdf }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg>PDF</a>{{ end }}
    {{ with $p.code }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>Code</a>{{ end }}
    {{ with $p.data }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>Data</a>{{ end }}
    {{ with $p.project }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3h7l2 4h9v13H3z"/><path d="M3 7h18"/></svg>Project</a>{{ end }}
    {{ with $p.project_url }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18z"/></svg>Project site</a>{{ end }}
    {{ with $p.oa_url }}<a class="chip" href="{{ . }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Open access</a>{{ end }}
  </div>
{{ end }}
