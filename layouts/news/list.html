{{ define "main" }}
  <style>
    .news-feed { border-top: 2px solid var(--ink); }
    .news-entry { display: grid; grid-template-columns: 168px minmax(0, 1fr); gap: 36px; padding: 28px 0; border-bottom: 1px solid var(--rule); }
    .news-entry__badge {
      justify-self: start; align-self: start; text-align: center;
      border: 1px solid var(--rule); border-radius: 3px; background: var(--paper-soft);
      padding: 10px 14px 11px; min-width: 118px;
    }
    .news-entry__date { display: block; color: var(--ink); font-family: var(--serif); font-size: 17px; font-weight: 700; line-height: 1.25; }
    .news-entry__cat {
      display: inline-block; margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--rule);
      color: var(--claret); font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .news-entry__body { min-width: 0; }
    .news-entry__body h2, .news-entry__body h3 { margin: 0 0 8px; font-family: var(--serif); font-size: 22px; line-height: 1.3; }
    .news-entry__body h2 a, .news-entry__body h3 a { color: var(--ink); text-decoration: none; }
    .news-entry__body h2 a:hover, .news-entry__body h3 a:hover { color: var(--claret); }
    .news-entry__body p { margin: 0; color: var(--muted); font-size: 15px; line-height: 1.6; }
    @media (max-width: 700px) {
      .news-entry { grid-template-columns: 1fr; gap: 12px; }
      .news-entry__badge { display: flex; align-items: baseline; gap: 12px; text-align: left; padding: 8px 12px; }
      .news-entry__cat { margin-top: 0; padding-top: 0; border-top: 0; }
    }
  </style>

  <header class="page-head"><div class="shell"><h1>{{ .Title }}</h1><p>{{ .Params.intro }}</p></div></header>
  <section class="section"><div class="shell"><div class="news-feed">
    {{ range .RegularPages.ByDate.Reverse }}
      <article class="news-entry">
        <div class="news-entry__badge">
          <span class="news-entry__date">{{ .Params.display_date | default (.Date.Format "2 Jan 2006") }}</span>
          {{ with .Params.category }}<span class="news-entry__cat">{{ . }}</span>{{ end }}
        </div>
        <div class="news-entry__body">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p>{{ .Params.summary }}</p>
        </div>
      </article>
    {{ end }}
  </div></div></section>
{{ end }}
